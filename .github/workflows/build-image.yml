name: Build & push image (arcos:tintflow)

# Builds this service in GitHub's cloud (free amd64 runner) and pushes to Docker
# Hub, so the laptop never compiles locally (avoids the Snapdragon HYPERVISOR_ERROR).
# Requires repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            CARGO_BUILD_JOBS=4
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/arcos:tintflow
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/arcos:tintflow-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
